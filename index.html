<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羅賓媒體戰略儀表板 | Robin Media Monitor 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bias-node { transition: all 0.3s ease; z-index: 10; }
        .bias-node:hover { transform: scale(1.2); cursor: pointer; z-index: 20; }
        .spectrum-bar { height: 8px; border-radius: 99px; }
        .status-green { color: #10b981; }
        .status-yellow { color: #fbbf24; }
        .status-red { color: #ef4444; }
        .status-gray { color: #d1d5db; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <header class="bg-slate-900 text-white p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter flex items-center">
                    <i class="fas fa-bat mr-3 text-blue-500"></i> ROBIN STRATEGIC DASHBOARD v3.1.2
                </h1>
                <p id="update-time" class="text-slate-500 text-xs mt-1 font-mono uppercase tracking-widest">System Online</p>
            </div>
            <div class="flex items-center space-x-4">
                <select id="date-selector" class="bg-slate-800 text-white text-xs font-bold border-2 border-slate-700 rounded-lg px-4 py-2 outline-none cursor-pointer hover:border-blue-500 transition shadow-inner">
                    <!-- Dates will be injected here -->
                </select>
                <span class="bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter shadow-lg">v3.1 Production</span>
            </div>
        </div>
    </header>

    <main id="dashboard-content" class="max-w-6xl mx-auto p-6 space-y-10">
        <!-- Loader -->
        <div class="text-center py-32 text-slate-400">
            <div class="inline-block w-12 h-12 border-4 border-slate-200 border-t-blue-500 rounded-full animate-spin mb-6"></div>
            <p class="font-mono text-sm tracking-widest">DECRYPTING MEDIA INTELLIGENCE...</p>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-600 text-center p-16 mt-20 border-t border-slate-800">
        <div class="max-w-6xl mx-auto">
            <p class="text-[10px] tracking-[0.3em] font-bold uppercase mb-4 opacity-50">Classified Information - Authorization 0508 Required</p>
            <p class="text-[9px] font-mono opacity-30">© 2026 Robin AI Monitoring System. Built for Strategic Oversight.</p>
        </div>
    </footer>

    <script>
        let historyData = {};

        async function initDashboard() {
            const container = document.getElementById('dashboard-content');
            try {
                // 強制抓取最新 JSON，加上亂數避開快取
                const response = await fetch('history.json?v=' + Math.random());
                if (!response.ok) throw new Error('Data endpoint unavailable');
                historyData = await response.json();
                
                const dateSelector = document.getElementById('date-selector');
                const dates = Object.keys(historyData).sort((a,b) => b.localeCompare(a));
                
                dateSelector.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
                
                dateSelector.addEventListener('change', (e) => {
                    renderDashboard(historyData[e.target.value]);
                });
                
                if (dates.length > 0) {
                    renderDashboard(historyData[dates[0]]);
                }
            } catch (err) {
                console.error('Initialization failed:', err);
                container.innerHTML = `
                    <div class="text-center py-32 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                        <i class="fas fa-exclamation-triangle text-red-500 text-5xl mb-6"></i>
                        <p class="text-xl font-black text-slate-800">INTELLIGENCE FEED DISRUPTED</p>
                        <p class="text-slate-400 text-sm mt-2 font-mono">Check history.json integrity and connection.</p>
                    </div>
                `;
            }
        }

        function renderDashboard(data) {
            const container = document.getElementById('dashboard-content');
            document.getElementById('update-time').innerText = `Last Sync: ${data.updateTime}`;
            
            let html = '';
            
            // A: Heatmap
            html += `
                <section class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100 overflow-hidden">
                    <div class="flex justify-between items-center mb-8 border-b border-slate-50 pb-6">
                        <h2 class="text-xl font-black tracking-tight flex items-center">
                            <i class="fas fa-layer-group mr-3 text-blue-600"></i> MEDIA COVERAGE MATRIX
                        </h2>
                        <div class="flex space-x-2">
                            <span class="w-3 h-3 bg-green-500 rounded-sm"></span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Full Stream</span>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] text-slate-400 uppercase font-black tracking-widest">
                                    <th class="pb-4">Strategic Topics</th>
                                    <th class="pb-4 text-center">UDN</th>
                                    <th class="pb-4 text-center">LTN</th>
                                    <th class="pb-4 text-center">FTV</th>
                                    <th class="pb-4 text-center">CT</th>
                                    <th class="pb-4 text-center">CTI</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                ${data.heatmap.map(row => `
                                    <tr class="group hover:bg-slate-50/50 transition">
                                        <td class="py-5 pr-4">
                                            <div class="text-sm font-bold text-slate-800 group-hover:text-blue-600 transition">${row.name}</div>
                                        </td>
                                        ${['udn', 'ltn', 'ftv', 'ct', 'cti'].map(m => {
                                            const status = row[m];
                                            let color = 'bg-slate-100 text-slate-300';
                                            let label = '';
                                            if (status === 'green') color = 'bg-green-500 shadow-sm shadow-green-200';
                                            if (status === 'yellow') color = 'bg-yellow-400';
                                            if (status === 'red') color = 'bg-red-500';
                                            if (status === 'red-video') {
                                                return `<td class="py-5 text-center">
                                                    <div class="w-10 h-6 mx-auto bg-red-100 rounded flex items-center justify-center border border-red-200">
                                                        <span class="text-[8px] font-black text-red-600 tracking-tighter">VIDEO</span>
                                                    </div>
                                                </td>`;
                                            }
                                            return `<td class="py-5 text-center">
                                                <div class="w-5 h-5 mx-auto ${color} rounded-sm transition-transform group-hover:scale-110"></div>
                                            </td>`;
                                        }).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </section>
            `;

            // B: Spectrums
            html += `
                <section class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
                    <h2 class="text-xl font-black tracking-tight mb-10 flex items-center border-b border-slate-50 pb-6">
                        <i class="fas fa-fingerprint mr-3 text-indigo-600"></i> BIAS FINGERPRINT ANALYSIS
                    </h2>
                    <div class="grid grid-cols-1 gap-16 px-2">
                        ${data.topics.map(t => {
                            const nodes = data.spectrums[t.id] || [];
                            return `
                                <div class="relative">
                                    <div class="flex justify-between items-start mb-10">
                                        <div class="max-w-md">
                                            <h3 class="text-sm font-black text-slate-900 mb-1">${t.title}</h3>
                                            <p class="text-[10px] text-slate-400 font-mono tracking-tight">${t.desc}</p>
                                        </div>
                                        <div class="px-3 py-1 bg-slate-100 rounded-md">
                                            <span class="text-[9px] font-black tracking-widest text-slate-500 uppercase">${t.consensus === 'high' ? 'High Consensus' : 'Spectrum Divergence'}</span>
                                        </div>
                                    </div>
                                    <div class="relative py-12">
                                        <div class="spectrum-bar w-full bg-gradient-to-r ${t.gradient} shadow-inner opacity-90"></div>
                                        <div class="flex justify-between mt-4 text-[9px] font-black text-slate-300 uppercase tracking-[0.2em]">
                                            <span class="text-blue-500">${t.labelLeft}</span>
                                            <span class="opacity-30">FACTUAL CORE</span>
                                            <span class="text-red-500">${t.labelRight}</span>
                                        </div>
                                        ${nodes.map(node => `
                                            <div class="bias-node absolute top-1/2 -translate-y-1/2 group" style="left: ${node.pos}; margin-left: -12px;">
                                                <div class="flex flex-col items-center">
                                                    <div class="w-6 h-6 ${node.color} rounded-full border-4 border-white shadow-lg ring-1 ring-slate-100 transition-all group-hover:scale-125 group-hover:ring-blue-400"></div>
                                                    <div class="mt-2 bg-slate-900 text-white px-2 py-0.5 rounded text-[8px] font-bold whitespace-nowrap shadow-md opacity-0 group-hover:opacity-100 transition-opacity">
                                                        ${node.name} ${node.note ? '(' + node.note + ')' : ''}
                                                    </div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </section>
            `;

            // C: Scorecards
            html += `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    ${data.scorecards.map(s => `
                        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100 flex flex-col hover:border-blue-200 transition group">
                            <div class="flex justify-between items-start mb-8">
                                <div>
                                    <div class="text-[10px] font-black text-blue-600 mb-1 tracking-widest uppercase opacity-60">Source Performance</div>
                                    <h3 class="font-black text-lg text-slate-800 tracking-tight">${s.name}</h3>
                                    <div class="text-[10px] font-mono text-slate-400">N-Value: ${s.n}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-3xl font-black ${s.battery > 80 ? 'text-green-500' : (s.battery > 50 ? 'text-blue-500' : 'text-red-500')} tracking-tighter">${s.battery}%</div>
                                    <i class="fas ${s.battery > 80 ? 'fa-bolt text-green-400' : 'fa-signal text-blue-400'} text-xs"></i>
                                </div>
                            </div>
                            <div class="space-y-4 mb-8">
                                ${['Speed', 'Depth', 'Neutral', 'Range', 'Trust'].map((label, idx) => `
                                    <div class="flex justify-between items-center">
                                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${label}</span>
                                        <div class="flex space-x-1">
                                            ${Array(5).fill(0).map((_, i) => `
                                                <div class="w-3 h-1.5 rounded-full ${i < s.scores[idx] ? 'bg-amber-400' : 'bg-slate-100'}"></div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            ${s.warning ? `
                                <div class="mt-auto p-3 bg-red-50 rounded-xl border border-red-100">
                                    <p class="text-[9px] text-red-500 font-bold leading-relaxed italic">${s.warning}</p>
                                </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;

            container.innerHTML = html;
        }

        initDashboard();
    </script>
</body>
</html>
