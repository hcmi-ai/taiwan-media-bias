<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羅賓媒體戰略儀表板 | Robin Media Monitor 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bias-node { transition: all 0.3s ease; z-index: 10; }
        .bias-node:hover { transform: scale(1.2); cursor: pointer; z-index: 20; }
        .spectrum-bar { height: 8px; border-radius: 99px; }
        #auth-overlay { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <!-- Auth Protection -->
    <div id="auth-overlay" class="fixed inset-0 z-[1000] flex items-center justify-center transition-all duration-500">
        <div class="max-w-md w-full p-8 text-center">
            <div class="mb-8">
                <i class="fas fa-bat text-blue-500 text-6xl animate-pulse mb-6"></i>
                <h2 class="text-white text-2xl font-black tracking-widest uppercase">Classified Access</h2>
                <p class="text-slate-500 text-xs mt-2 font-mono">Authorization Level 0508 Required</p>
            </div>
            <input type="password" id="passcode" placeholder="ENTER CODE" 
                   class="w-full bg-slate-800 border-2 border-slate-700 rounded-2xl p-4 text-center text-blue-400 font-mono text-xl outline-none focus:border-blue-500 transition shadow-2xl">
            <div id="auth-error" class="text-red-500 text-[10px] mt-4 font-bold opacity-0 uppercase tracking-tighter">Access Denied - Attempt Logged</div>
        </div>
    </div>

    <header class="bg-slate-900 text-white p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter flex items-center">
                    <i class="fas fa-bat mr-3 text-blue-500"></i> ROBIN STRATEGIC DASHBOARD v3.1.5
                </h1>
                <p id="update-time" class="text-slate-500 text-xs mt-1 font-mono uppercase tracking-widest">System Online</p>
            </div>
            <div class="flex items-center space-x-4">
                <select id="date-selector" class="bg-slate-800 text-white text-xs font-bold border-2 border-slate-700 rounded-lg px-4 py-2 outline-none cursor-pointer hover:border-blue-500 transition shadow-inner">
                    <!-- Dates injected here -->
                </select>
                <span class="bg-gradient-to-r from-blue-600 to-indigo-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter shadow-lg">v3.1 Production</span>
            </div>
        </div>
    </header>

    <main id="dashboard-content" class="max-w-6xl mx-auto p-6 space-y-10 opacity-0 transition-opacity duration-1000">
        <div class="text-center py-32 text-slate-400">
            <div class="inline-block w-12 h-12 border-4 border-slate-200 border-t-blue-500 rounded-full animate-spin mb-6"></div>
            <p class="font-mono text-sm tracking-widest uppercase">Decrypting Intelligence...</p>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-600 text-center p-16 mt-20 border-t border-slate-800">
        <div class="max-w-6xl mx-auto">
            <p class="text-[10px] tracking-[0.3em] font-bold uppercase mb-4 opacity-50">Classified Information - Authorization 0508 Required</p>
            <p class="text-[9px] font-mono opacity-30">© 2026 Robin AI Monitoring System. Built for Strategic Oversight.</p>
        </div>
    </footer>

    <script>
        const PIN = "0508";
        let historyData = {};

        async function init() {
            const overlay = document.getElementById('auth-overlay');
            const input = document.getElementById('passcode');
            const error = document.getElementById('auth-error');

            input.focus();
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    if (input.value === PIN) {
                        overlay.style.opacity = '0';
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            loadDashboard();
                        }, 500);
                    } else {
                        error.style.opacity = '1';
                        input.value = '';
                        setTimeout(() => error.style.opacity = '0', 2000);
                    }
                }
            });
        }

        async function loadDashboard() {
            const content = document.getElementById('dashboard-content');
            content.style.opacity = '1';
            
            try {
                const response = await fetch('reports/history.json?v=' + Date.now());
                if (!response.ok) throw new Error('Network response was not ok');
                const rawData = await response.json();

                // Compatibility layer
                if (Array.isArray(rawData)) {
                    historyData = {};
                    rawData.forEach((entry, i) => {
                        const key = entry.timestamp || `Entry_${i}`;
                        historyData[key] = entry;
                    });
                } else {
                    historyData = rawData;
                }

                const dateSelector = document.getElementById('date-selector');
                const dates = Object.keys(historyData).sort((a,b) => b.localeCompare(a));
                
                if (dates.length === 0) throw new Error('No data found');

                dateSelector.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
                dateSelector.addEventListener('change', (e) => render(historyData[e.target.value]));
                
                render(historyData[dates[0]]);
            } catch (err) {
                document.getElementById('dashboard-content').innerHTML = `<div class="text-center text-red-500 py-20 font-black">FEED DISRUPTED: ${err.message}</div>`;
            }
        }

        function render(data) {
            const container = document.getElementById('dashboard-content');
            document.getElementById('update-time').innerText = `Sync: ${data.updateTime || data.timestamp}`;
            
            let html = '';
            
            // A: Heatmap
            if (data.heatmap) {
                html += `
                    <section class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100 overflow-hidden">
                        <h2 class="text-xl font-black tracking-tight mb-8 flex items-center border-b border-slate-50 pb-6">
                            <i class="fas fa-layer-group mr-3 text-blue-600"></i> MEDIA COVERAGE MATRIX
                        </h2>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="text-[10px] text-slate-400 uppercase font-black tracking-widest">
                                        <th class="pb-4">Strategic Topics</th>
                                        <th class="pb-4 text-center">UDN</th>
                                        <th class="pb-4 text-center">LTN</th>
                                        <th class="pb-4 text-center">FTV</th>
                                        <th class="pb-4 text-center">CT</th>
                                        <th class="pb-4 text-center">CTI</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-50">
                                    ${data.heatmap.map(row => `
                                        <tr>
                                            <td class="py-5 pr-4 text-sm font-bold text-slate-800">${row.name}</td>
                                            ${['udn', 'ltn', 'ftv', 'ct', 'cti'].map(m => {
                                                const status = row[m];
                                                let color = 'bg-slate-100';
                                                if (status === 'green') color = 'bg-green-500';
                                                if (status === 'yellow') color = 'bg-yellow-400';
                                                if (status === 'red') color = 'bg-red-500';
                                                if (status === 'red-video') return `<td class="text-center"><span class="text-[8px] bg-red-100 text-red-600 px-1 rounded font-bold">VIDEO</span></td>`;
                                                return `<td class="text-center"><div class="w-4 h-4 mx-auto ${color} rounded-sm"></div></td>`;
                                            }).join('')}
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </section>
                `;
            }

            // B: Spectrums
            if (data.topics && data.spectrums) {
                html += `
                    <section class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
                        <h2 class="text-xl font-black tracking-tight mb-10 flex items-center border-b border-slate-50 pb-6">
                            <i class="fas fa-fingerprint mr-3 text-indigo-600"></i> BIAS FINGERPRINT
                        </h2>
                        <div class="space-y-16">
                            ${data.topics.map(t => {
                                const nodes = data.spectrums[t.id] || [];
                                return `
                                    <div class="relative">
                                        <h3 class="text-sm font-black text-slate-900 mb-1">${t.title}</h3>
                                        <p class="text-[10px] text-slate-400 font-mono mb-6">${t.desc}</p>
                                        <div class="relative py-10">
                                            <div class="spectrum-bar w-full bg-gradient-to-r ${t.gradient || 'from-blue-500 to-red-500'} opacity-80"></div>
                                            <div class="flex justify-between mt-2 text-[8px] font-black text-slate-300 uppercase tracking-widest">
                                                <span>${t.labelLeft}</span><span>${t.labelRight}</span>
                                            </div>
                                            ${nodes.map(node => `
                                                <div class="bias-node absolute top-1/2 -translate-y-1/2" style="left: ${node.pos}; margin-left: -10px;">
                                                    <div class="w-5 h-5 ${node.color} rounded-full border-2 border-white shadow-md"></div>
                                                    <div class="text-[7px] font-bold mt-1 text-center whitespace-nowrap">${node.name}</div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </section>
                `;
            }

            // C: Scorecards
            if (data.scorecards) {
                html += `<div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    ${data.scorecards.map(s => `
                        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
                            <h3 class="font-black text-lg text-slate-800">${s.name}</h3>
                            <div class="text-2xl font-black text-blue-600 mb-4">${s.battery}%</div>
                            <div class="space-y-2">
                                ${['Speed', 'Depth', 'Neutral', 'Range', 'Trust'].map((label, idx) => `
                                    <div class="flex justify-between text-[8px] font-bold uppercase tracking-widest text-slate-400">
                                        <span>${label}</span>
                                        <div class="flex space-x-0.5">${Array(5).fill(0).map((_, i) => `<div class="w-2 h-1 rounded-full ${i < s.scores[idx] ? 'bg-blue-400' : 'bg-slate-100'}"></div>`).join('')}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            }

            container.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
